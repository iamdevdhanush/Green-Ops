<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Change Password - GreenOps</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <div class="login-header">
                <h1>Change Password</h1>
                <p>Please change your default password</p>
            </div>

            <div id="error-message" class="alert alert-error hidden"></div>
            <div id="success-message" class="alert alert-success hidden"></div>

            <form id="change-password-form">
                <div class="form-group">
                    <label class="form-label" for="old-password">Current Password</label>
                    <input 
                        type="password" 
                        id="old-password" 
                        name="old_password" 
                        class="form-input" 
                        required
                    >
                </div>

                <div class="form-group">
                    <label class="form-label" for="new-password">New Password</label>
                    <input 
                        type="password" 
                        id="new-password" 
                        name="new_password" 
                        class="form-input" 
                        required
                        minlength="8"
                    >
                    <small style="color: var(--gray-600); font-size: 0.875rem;">
                        Minimum 8 characters
                    </small>
                </div>

                <div class="form-group">
                    <label class="form-label" for="confirm-password">Confirm New Password</label>
                    <input 
                        type="password" 
                        id="confirm-password" 
                        name="confirm_password" 
                        class="form-input" 
                        required
                    >
                </div>

                <button type="submit" class="btn btn-primary">Change Password</button>
            </form>
        </div>
    </div>

    <script>
        const user = JSON.parse(localStorage.getItem('user') || '{}');
        
        if (!user.username) {
            window.location.href = '/login';
        }
        
        document.getElementById('change-password-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const oldPassword = document.getElementById('old-password').value;
            const newPassword = document.getElementById('new-password').value;
            const confirmPassword = document.getElementById('confirm-password').value;
            const errorDiv = document.getElementById('error-message');
            const successDiv = document.getElementById('success-message');
            
            errorDiv.classList.add('hidden');
            successDiv.classList.add('hidden');
            
            if (newPassword !== confirmPassword) {
                errorDiv.textContent = 'New passwords do not match';
                errorDiv.classList.remove('hidden');
                return;
            }
            
            if (newPassword.length < 8) {
                errorDiv.textContent = 'Password must be at least 8 characters';
                errorDiv.classList.remove('hidden');
                return;
            }
            
            try {
                const response = await fetch('/api/auth/change-password', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        username: user.username,
                        old_password: oldPassword,
                        new_password: newPassword
                    })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    successDiv.textContent = 'Password changed successfully! Redirecting...';
                    successDiv.classList.remove('hidden');
                    
                    setTimeout(() => {
                        window.location.href = '/login';
                    }, 2000);
                } else {
                    errorDiv.textContent = data.error || 'Failed to change password';
                    errorDiv.classList.remove('hidden');
                }
            } catch (error) {
                errorDiv.textContent = 'Connection error. Please try again.';
                errorDiv.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
